# Publishes this package to the npm registry when you push a version tag.
#
# Authentication: npm trusted publishing (OIDC) — no NPM_TOKEN secret.
# Docs: https://docs.npmjs.com/trusted-publishers
#
# One-time on npmjs.com (package → Settings → Trusted publishing → GitHub Actions):
# - Repository: same GitHub owner/repo as this workflow runs in.
# - Workflow filename: publish.yml (exact; case-sensitive).
# - package.json "repository.url" must match that repo exactly (see npm troubleshooting).
#
# Alternative: classic publish — add repository secret NPM_TOKEN and set on the Publish step:
#   env:
#     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
#
# How to publish:
# 1. Bump "version" in package.json (e.g. 0.2.0), commit.
# 2. git tag v0.2.0 && git push origin v0.2.0
#    Tag must match semver with leading v: v*

name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (GitHub → npm OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      # Scoped public package: --access public required. npm uses OIDC when trusted publishing is configured.
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
